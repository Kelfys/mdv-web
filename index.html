<!DOCTYPE html>
<!-- MaredeVendas — SPA vanilla (ES Modules + Supabase). Conteúdo em #main via js/app.js; ?v= no deploy invalida cache. -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Seu shopping online de lojas perto de você. Explore, monte o carrinho e peça pelo WhatsApp — rápido e sem complicação." data-mv-string="app.metaDescription" />
  <meta name="theme-color" content="#C9A100" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <!-- title/description estáticos abaixo são fallback; o módulo strings.js atualiza no load -->
  <title>MaredeVendas — Seu shopping online local</title>

  <!-- Preview ao compartilhar link (WhatsApp, Facebook, Twitter/X, LinkedIn, etc.)
       URLs absolutas: scrapers não executam JS. Atualize se o domínio mudar. -->
  <link rel="canonical" href="https://maredevendas.com.br/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:site_name" content="MaredeVendas" />
  <meta property="og:url" content="https://maredevendas.com.br/" />
  <meta property="og:title" content="MaredeVendas — Seu shopping online local" />
  <meta property="og:description" content="Seu shopping online de lojas perto de você. Explore, monte o carrinho e peça pelo WhatsApp — rápido e sem complicação." />
  <meta property="og:image" content="https://maredevendas.com.br/assets/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="MaredeVendas — Seu shopping online" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MaredeVendas — Seu shopping online local" />
  <meta name="twitter:description" content="Seu shopping online de lojas perto de você. Explore, monte o carrinho e peça pelo WhatsApp." />
  <meta name="twitter:image" content="https://maredevendas.com.br/assets/og-image.png" />
  <script type="module">
    const base = window.__MV_BASE__ || './'
    // Sincroniza <title> e meta description com app.pageTitle / app.metaDescription
    import(base + 'js/strings.js').then(({ t }) => {
      document.title = t('app.pageTitle')
      const meta = document.querySelector('meta[data-mv-string="app.metaDescription"]')
      if (meta) meta.setAttribute('content', t('app.metaDescription'))
    })
  </script>
  <script>
    (function () {
      // Base só no GitHub Pages (projeto em /MaredeVendas-vanilla/). Domínio .br fica na raiz.
      var GITHUB_BASE = '/MaredeVendas-vanilla'
      var path = location.pathname || '/'
      var onGithubProject = path === GITHUB_BASE || path.indexOf(GITHUB_BASE + '/') === 0
      window.__MV_BASE__ = onGithubProject ? GITHUB_BASE + '/' : './'

      function normalizeRoutePath(raw) {
        if (!raw || raw === '/') return ''
        var p = raw.charAt(0) === '/' ? raw : '/' + raw
        return p.split('?')[0].replace(/\/$/, '') || '/'
      }

      var deepSub = ''
      var hash = location.hash.replace(/^#/, '')
      if (!hash || hash === '/') {
        if (onGithubProject) {
          var rest = path.slice(GITHUB_BASE.length) || '/'
          deepSub = rest === '/' ? '' : rest.replace(/\/$/, '')
          if (deepSub && deepSub !== '/') {
            history.replaceState(null, '', GITHUB_BASE + '/#' + deepSub + location.search)
            hash = location.hash.replace(/^#/, '') || deepSub
          }
        } else if (path !== '/') {
          deepSub = path.replace(/\/$/, '') || ''
          if (deepSub && deepSub !== '/') {
            history.replaceState(null, '', '/#' + deepSub + location.search)
            hash = location.hash.replace(/^#/, '') || deepSub
          }
        }
      }

      var route = normalizeRoutePath(hash || deepSub)
      if (route && route !== '/') {
        window.__MV_INITIAL_ROUTE__ = route
      }
    })()
  </script>
  <link rel="icon" href="favicon.svg?v=20260713e" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg?v=20260713e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    (function () {
      if (window.__MV_BASE__ === './') return
      var css = document.querySelector('link[href="css/styles.css"]')
      if (css) css.href = window.__MV_BASE__ + 'css/styles.css'
      document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach(function (el) {
        var href = el.getAttribute('href') || ''
        if (href.indexOf('assets/') === 0 || href.indexOf('favicon') !== -1) {
          el.href = window.__MV_BASE__ + href.replace(/^\.\//, '')
        }
      })
    })()
  </script>
</head>
<body>
  <div id="app">
    <header id="header" class="header"></header>
    <main id="main" class="main"><div class="loading"><div class="spinner"></div></div></main>
    <div id="cart-root"></div>
    <div id="toast" class="toast hidden" role="status"></div>
  </div>
  <script type="module">
    const base = window.__MV_BASE__ || './'

    async function purgeLegacyPwaCache() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations()
        await Promise.all(regs.map((r) => r.unregister()))
      }
      if ('caches' in window) {
        const keys = await caches.keys()
        await Promise.all(keys.filter((k) => k.startsWith('maredevendas')).map((k) => caches.delete(k)))
      }
    }

    // Carrega strings antes do app para mensagem de erro de bootstrap (app.loadError*)
    const [{ t }] = await Promise.all([
      import(base + 'js/strings.js'),
    ]).catch(() => [{ t: (key) => key }])

    await purgeLegacyPwaCache()
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(base + 'sw.js').catch(() => {})
    }

    import(base + 'js/app.js').catch((err) => {
      console.error('[MaredeVendas] Falha ao carregar app:', err)
      const main = document.getElementById('main')
      if (main) {
        main.innerHTML = `<div class="empty-state" style="padding:2rem"><h2>${t('app.loadErrorTitle')}</h2><p>Tente abrir a <a href="${base}">${t('app.loadErrorHomeLink')}</a> e navegar pelo menu.</p></div>`
      }
    })
  </script>
</body>
</html>
