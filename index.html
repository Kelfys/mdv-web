<!DOCTYPE html>
<!-- MaredeVendas — SPA vanilla (ES Modules + Supabase). Conteúdo em #main via js/app.js; ?v= no deploy invalida cache. -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Marketplace de lojas locais. Encontre produtos perto de você e peça direto pelo WhatsApp." data-mv-string="app.metaDescription" />
  <meta name="theme-color" content="#E1306C" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <!-- title/description estáticos abaixo são fallback; o módulo strings.js atualiza no load -->
  <title>MaredeVendas — Marketplace Local</title>
  <script type="module">
    const base = window.__MV_BASE__ || './'
    // Sincroniza <title> e meta description com app.pageTitle / app.metaDescription
    import(base + 'js/strings.js').then(({ t }) => {
      document.title = t('app.pageTitle')
      const meta = document.querySelector('meta[data-mv-string="app.metaDescription"]')
      if (meta) meta.setAttribute('content', t('app.metaDescription'))
    })
  </script>
  <script>
    (function () {
      // Base só no GitHub Pages (projeto em /MaredeVendas-vanilla/). Domínio .br fica na raiz.
      var GITHUB_BASE = '/MaredeVendas-vanilla'
      var path = location.pathname || '/'
      var onGithubProject = path === GITHUB_BASE || path.indexOf(GITHUB_BASE + '/') === 0
      window.__MV_BASE__ = onGithubProject ? GITHUB_BASE + '/' : './'

      function normalizeRoutePath(raw) {
        if (!raw || raw === '/') return ''
        var p = raw.charAt(0) === '/' ? raw : '/' + raw
        return p.split('?')[0].replace(/\/$/, '') || '/'
      }

      var deepSub = ''
      var hash = location.hash.replace(/^#/, '')
      if (!hash || hash === '/') {
        if (onGithubProject) {
          var rest = path.slice(GITHUB_BASE.length) || '/'
          deepSub = rest === '/' ? '' : rest.replace(/\/$/, '')
          if (deepSub && deepSub !== '/') {
            history.replaceState(null, '', GITHUB_BASE + '/#' + deepSub + location.search)
            hash = location.hash.replace(/^#/, '') || deepSub
          }
        } else if (path !== '/') {
          deepSub = path.replace(/\/$/, '') || ''
          if (deepSub && deepSub !== '/') {
            history.replaceState(null, '', '/#' + deepSub + location.search)
            hash = location.hash.replace(/^#/, '') || deepSub
          }
        }
      }

      var route = normalizeRoutePath(hash || deepSub)
      if (route && route !== '/') {
        window.__MV_INITIAL_ROUTE__ = route
      }
    })()
  </script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    (function () {
      if (window.__MV_BASE__ === './') return
      var css = document.querySelector('link[href="css/styles.css"]')
      if (css) css.href = window.__MV_BASE__ + 'css/styles.css'
      var icon = document.querySelector('link[href="favicon.svg"]')
      if (icon) icon.href = window.__MV_BASE__ + 'favicon.svg'
    })()
  </script>
</head>
<body>
  <div id="app">
    <header id="header" class="header"></header>
    <main id="main" class="main"><div class="loading"><div class="spinner"></div></div></main>
    <div id="cart-root"></div>
    <div id="toast" class="toast hidden" role="status"></div>
  </div>
  <script type="module">
    const base = window.__MV_BASE__ || './'
    // Carrega strings antes do app para mensagem de erro de bootstrap (app.loadError*)
    const [{ t }] = await Promise.all([
      import(base + 'js/strings.js'),
    ]).catch(() => [{ t: (key) => key }])
    import(base + 'js/app.js').catch((err) => {
      console.error('[MaredeVendas] Falha ao carregar app:', err)
      const main = document.getElementById('main')
      if (main) {
        main.innerHTML = `<div class="empty-state" style="padding:2rem"><h2>${t('app.loadErrorTitle')}</h2><p>Tente abrir a <a href="${base}">${t('app.loadErrorHomeLink')}</a> e navegar pelo menu.</p></div>`
      }
    })
  </script>
</body>
</html>
