<!DOCTYPE html>
<!-- MaredeVendas — SPA vanilla (ES Modules + Supabase). Conteúdo em #main via js/app.js; ?v= no deploy invalida cache. -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Marketplace de lojas locais. Encontre produtos perto de você e peça direto pelo WhatsApp." />
  <meta name="theme-color" content="#2563eb" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>MaredeVendas — Marketplace Local</title>
  <script>
    (function () {
      var match = location.pathname.match(/^(\/[^/]+)/)
      window.__MV_BASE__ = (match && !match[1].includes('.')) ? match[1] + '/' : './'

      function normalizeRoutePath(raw) {
        if (!raw || raw === '/') return ''
        var path = raw.charAt(0) === '/' ? raw : '/' + raw
        return path.split('?')[0].replace(/\/$/, '') || '/'
      }

      var deepSub = ''
      var hash = location.hash.replace(/^#/, '')
      if (!hash || hash === '/') {
        var deep = location.pathname.match(/^(\/[^/]+)(\/.*)?$/)
        deepSub = deep && deep[2] ? deep[2].replace(/\/$/, '') : ''
        if (deepSub && deepSub !== '/') {
          var target = deep[1] + '/#' + deepSub + location.search
          history.replaceState(null, '', target)
          hash = location.hash.replace(/^#/, '') || deepSub
        }
      }

      var route = normalizeRoutePath(hash || deepSub)
      if (route && route !== '/') {
        window.__MV_INITIAL_ROUTE__ = route
      }
    })()
  </script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    (function () {
      if (window.__MV_BASE__ === './') return
      var css = document.querySelector('link[href="css/styles.css"]')
      if (css) css.href = window.__MV_BASE__ + 'css/styles.css'
      var icon = document.querySelector('link[href="favicon.svg"]')
      if (icon) icon.href = window.__MV_BASE__ + 'favicon.svg'
    })()
  </script>
</head>
<body>
  <div id="app">
    <header id="header" class="header"></header>
    <main id="main" class="main"><div class="loading"><div class="spinner"></div></div></main>
    <div id="cart-root"></div>
    <div id="toast" class="toast hidden" role="status"></div>
  </div>
  <script type="module">
    const base = window.__MV_BASE__ || './'
    import(base + 'js/app.js').catch((err) => {
      console.error('[MaredeVendas] Falha ao carregar app:', err)
      const main = document.getElementById('main')
      if (main) {
        main.innerHTML = '<div class="empty-state" style="padding:2rem"><h2>Erro ao carregar</h2><p>Tente abrir a <a href="' + base + '">página inicial</a> e navegar pelo menu.</p></div>'
      }
    })
  </script>
</body>
</html>
