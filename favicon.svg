<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="MaredeVendas">
  <!-- Badge vetorial da marca (baseado no favicon.jpg) -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb347"/>
      <stop offset="0.55" stop-color="#e86a5c"/>
      <stop offset="1" stop-color="#5c4638"/>
    </linearGradient>
    <radialGradient id="face" cx="42%" cy="36%" r="62%">
      <stop offset="0" stop-color="#ffe97a"/>
      <stop offset="1" stop-color="#f0bc00"/>
    </radialGradient>
    <linearGradient id="mBlue" x1="40" y1="34" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b93f0"/>
      <stop offset="1" stop-color="#1a4fb5"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="0" fill="url(#sky)"/>
  <!-- silhuetas suaves (só leitura em favicon) -->
  <ellipse cx="24" cy="112" rx="36" ry="22" fill="#3d6b3a" opacity="0.45"/>
  <ellipse cx="108" cy="108" rx="40" ry="26" fill="#4a3a2a" opacity="0.35"/>
  <circle cx="104" cy="22" r="18" fill="#fff" opacity="0.14"/>

  <g filter="url(#soft)">
    <!-- aro branco -->
    <circle cx="64" cy="56" r="40" fill="#f4f6f8"/>
    <circle cx="64" cy="56" r="34" fill="url(#face)"/>
    <g stroke="#e0b000" stroke-width="0.7" opacity="0.28">
      <line x1="32" y1="44" x2="96" y2="44"/>
      <line x1="32" y1="56" x2="96" y2="56"/>
      <line x1="32" y1="68" x2="96" y2="68"/>
    </g>

    <!-- M azul geométrico -->
    <path
      fill="url(#mBlue)"
      d="M41 84.5V38.8c0-1.4 1.15-2.55 2.55-2.55h7.1c1 0 1.9.55 2.35 1.45L64 61.2l10.95-23.5c.45-.9 1.35-1.45 2.35-1.45h7.2c1.4 0 2.55 1.15 2.55 2.55v45.7c0 1.4-1.15 2.55-2.55 2.55h-6.1c-1.4 0-2.55-1.15-2.55-2.55V52.8L68.4 75.6c-.5 1.05-1.55 1.7-2.75 1.7h-3.3c-1.2 0-2.25-.65-2.75-1.7L50.2 52.8v31.7c0 1.4-1.15 2.55-2.55 2.55h-6.1c-1.4 0-2.55-1.15-2.55-2.55z"
    />

    <!-- V / check branco 3D no miolo (como na arte) -->
    <path
      fill="#ffffff"
      d="M48.5 68.5c-.55-.65-.5-1.65.15-2.2.6-.5 1.5-.5 2.1.05l4.85 4.55c.45.4 1.15.4 1.6 0l12.1-11.2c.6-.55 1.55-.55 2.15.05.55.55.55 1.45.05 2.05L58.4 78.9c-1.15 1.1-2.95 1.1-4.1 0L48.5 68.5z"
    />
    <path
      fill="#e8eef8"
      d="M53.8 70.2l2.1 1.95c.55.5 1.35.5 1.9 0l8.6-7.95-1.55-1.45-8.45 7.8-1.7-1.6-0.9 1.25z"
      opacity="0.55"
    />
  </g>
</svg>
