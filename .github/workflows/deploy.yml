# Deploy automático para GitHub Pages.
# 1) Roda testes Vitest  2) Monta dist/ com cache bust  3) Publica gh-pages
# Dispara: push na main ou manualmente: gh workflow run deploy.yml
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html strings-editor.html favicon.svg 404.html README.md dist/
          # assets/ — estáticos servidos via assetHref() em js/config.js
          cp -r css js assets dist/
          touch dist/.nojekyll
          BUILD_ID="${GITHUB_SHA::7}"
          sed -i "s|+ 'css/styles.css'|+ 'css/styles.css?v=${BUILD_ID}'|g" dist/index.html
          sed -i "s|+ 'js/app.js'|+ 'js/app.js?v=${BUILD_ID}'|g" dist/index.html
          chmod +x .github/bust-js-cache.sh .github/copy-spa-shells.sh
          ./.github/bust-js-cache.sh dist "${BUILD_ID}"
          ./.github/copy-spa-shells.sh dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4