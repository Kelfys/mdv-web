# Deploy automático para GitHub Pages via GitHub Actions (sem Jekyll).
# Publica index.html, css/, js/, README.md e demais estáticos.
# Injeta ?v=<commit> em app.js e styles.css para cache bust no mobile.
# Dispara em push na main ou manualmente: gh workflow run deploy.yml
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html favicon.svg 404.html README.md dist/
          cp -r css js dist/
          touch dist/.nojekyll
          BUILD_ID="${GITHUB_SHA::7}"
          sed -i "s|href=\"css/styles.css\"|href=\"css/styles.css?v=${BUILD_ID}\"|" dist/index.html
          sed -i "s|src=\"js/app.js\"|src=\"js/app.js?v=${BUILD_ID}\"|" dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4