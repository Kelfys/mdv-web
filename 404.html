<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>MaredeVendas</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; text-align: center; color: #334155; }
    a { color: #E1306C; }
  </style>
  <script>
    (function () {
      var GITHUB_BASE = 'MaredeVendas-vanilla'
      var parts = location.pathname.split('/').filter(Boolean)
      var home = '/'
      var subpath = '/'
      if (parts[0] === GITHUB_BASE) {
        home = '/' + GITHUB_BASE + '/'
        subpath = '/' + parts.slice(1).join('/')
      } else if (parts.length) {
        subpath = '/' + parts.join('/')
      }
      if (subpath === '/') subpath = '/'
      var target = home + '#' + subpath + location.search
      // Evita hash duplicado se já houver um
      if (location.hash && location.hash !== '#' && location.hash !== '#/') {
        target = home + location.hash + location.search
      }
      location.replace(target)
    })()
  </script>
</head>
<body>
  <p>Redirecionando…</p>
  <p><a id="spa-fallback" href="/">Clique aqui se não for redirecionado</a></p>
  <script>
    (function () {
      var GITHUB_BASE = 'MaredeVendas-vanilla'
      var parts = location.pathname.split('/').filter(Boolean)
      var home = '/'
      var subpath = '/'
      if (parts[0] === GITHUB_BASE) {
        home = '/' + GITHUB_BASE + '/'
        subpath = '/' + parts.slice(1).join('/')
      } else if (parts.length) {
        subpath = '/' + parts.join('/')
      }
      if (subpath === '/') subpath = '/'
      var link = document.getElementById('spa-fallback')
      if (link) link.href = home + '#' + subpath
    })()
  </script>
</body>
</html>
