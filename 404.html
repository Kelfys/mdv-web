<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>MaredeVendas</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; text-align: center; color: #334155; }
    a { color: #E1306C; }
  </style>
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean)
      var home = parts.length ? '/' + parts[0] + '/' : '/'
      var subpath = '/' + parts.slice(1).join('/')
      if (subpath === '/') subpath = '/'
      var target = home + '#' + subpath + location.search + location.hash
      location.replace(target)
    })()
  </script>
</head>
<body>
  <p>Redirecionando…</p>
  <p><a id="spa-fallback" href="/">Clique aqui se não for redirecionado</a></p>
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean)
      var home = parts.length ? '/' + parts[0] + '/' : '/'
      var subpath = '/' + parts.slice(1).join('/')
      if (subpath === '/') subpath = '/'
      var link = document.getElementById('spa-fallback')
      if (link) link.href = home + '#' + subpath
    })()
  </script>
</body>
</html>
